services:
  - type: web
    name: chatapp
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: chat-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
