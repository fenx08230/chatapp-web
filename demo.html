<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ChatApp</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#075E54;--primary-dark:#054D44;--accent:#25D366;--accent-glow:#25D36640;
  --sent:#DCF8C6;--sent-shadow:#b8e6a0;--bg:#ECE5DD;--bg-pattern:#d4cec4;
  --white:#fff;--text:#1a1a1a;--text-sec:#667781;--text-light:#8696a0;
  --divider:#e9edef;--danger:#ea4335;--online:#25D366;
  --radius:14px;--radius-sm:10px;--shadow:0 2px 12px rgba(0,0,0,.08);
  --font:'Noto Sans SC',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:#1a1a1a;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none;border:none}

#app{
  position:relative;width:100%;max-width:420px;height:100vh;max-height:820px;
  margin:0 auto;background:var(--bg);overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.3);
}
@media(min-width:500px){
  #app{border-radius:24px;margin-top:max(1vh,8px);height:min(98vh,820px)}
  body{display:flex;align-items:flex-start;justify-content:center;padding-top:1vh}
}

.header{
  position:relative;z-index:10;padding:12px 16px 10px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
  color:var(--white);display:flex;align-items:center;gap:12px;min-height:56px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.header h1{font-size:18px;font-weight:600;flex:1;letter-spacing:-.2px}
.header .subtitle{font-size:11px;opacity:.7;font-weight:300;margin-top:1px}
.header-back{
  width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;
  transition:background .2s;
}
.header-back:hover{background:rgba(255,255,255,.22)}
.header-action{
  padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.15);
  color:#fff;font-size:13px;font-weight:500;transition:all .2s;
}
.header-action:hover{background:rgba(255,255,255,.25)}

/* Login */
.login-screen{
  height:100%;display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(160deg,var(--primary) 0%,#0a3d36 40%,#071e1b 100%);
  padding:0 32px;justify-content:center;position:relative;overflow:hidden;
}
.login-screen::before{
  content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  border-radius:50%;background:var(--accent);opacity:.06;
}
.login-screen::after{
  content:'';position:absolute;bottom:-80px;left:-40px;width:260px;height:260px;
  border-radius:50%;background:var(--accent);opacity:.04;
}
.login-logo{
  width:72px;height:72px;border-radius:22px;
  background:linear-gradient(135deg,var(--accent),#1eba59);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;color:#fff;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(37,211,102,.3);
  animation:logoIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
.login-title{color:#fff;font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:36px;font-weight:300}
.login-tabs{display:flex;gap:0;margin-bottom:24px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.login-tab{
  padding:8px 28px;font-size:14px;font-weight:500;color:rgba(255,255,255,.5);
  background:transparent;transition:all .25s;
}
.login-tab.active{background:var(--accent);color:#fff;border-radius:10px}
.login-input{
  width:100%;padding:14px 16px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,.1);color:#fff;font-size:15px;
  margin-bottom:12px;backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.06);transition:all .25s;
}
.login-input::placeholder{color:rgba(255,255,255,.35)}
.login-input:focus{background:rgba(255,255,255,.15);border-color:var(--accent)}
.login-btn{
  width:100%;padding:14px;border-radius:var(--radius-sm);margin-top:8px;
  background:linear-gradient(135deg,var(--accent),#1eba59);
  color:#fff;font-size:16px;font-weight:600;letter-spacing:.3px;
  box-shadow:0 4px 20px rgba(37,211,102,.35);transition:all .25s;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(37,211,102,.45)}
.login-btn:active{transform:scale(.98)}

/* Tab bar */
.tab-bar{
  position:absolute;bottom:0;left:0;right:0;height:56px;
  background:var(--white);display:flex;border-top:1px solid var(--divider);
  z-index:20;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:var(--text-light);font-size:11px;font-weight:500;
  background:transparent;transition:color .2s;position:relative;
}
.tab-item.active{color:var(--primary)}
.tab-item .tab-icon{font-size:22px;line-height:1}
.tab-item .tab-badge{
  position:absolute;top:4px;right:calc(50% - 20px);
  min-width:18px;height:18px;border-radius:9px;
  background:var(--danger);color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
}

/* Scrollable content */
.screen-body{
  height:calc(100% - 56px - 56px);overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;scroll-behavior:smooth;
}
.screen-body.no-tab{height:calc(100% - 56px)}
.screen-body::-webkit-scrollbar{width:0}

/* Chat list */
.chat-list{background:var(--white)}
.chat-item{
  display:flex;align-items:center;gap:14px;padding:12px 16px;
  transition:background .15s;cursor:pointer;position:relative;
}
.chat-item:hover{background:#f5f6f6}
.chat-item::after{
  content:'';position:absolute;bottom:0;left:76px;right:16px;height:1px;background:var(--divider);
}
.avatar{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;color:#fff;position:relative;
}
.avatar.sm{width:42px;height:42px;font-size:15px}
.avatar .online-dot{
  position:absolute;bottom:1px;right:1px;width:12px;height:12px;
  border-radius:50%;background:var(--online);border:2px solid var(--white);
}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:16px;font-weight:500;color:var(--text);margin-bottom:2px}
.chat-last{font-size:13px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:11px;color:var(--text-light)}
.unread-badge{
  min-width:20px;height:20px;border-radius:10px;
  background:var(--accent);color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 6px;
}

/* Chat detail */
.chat-messages{
  height:calc(100% - 56px - 58px);overflow-y:auto;
  padding:8px 12px 12px;background:var(--bg);
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 15 L30 12 L25 15Z' fill='%23d4cec455'/%3E%3Ccircle cx='10' cy='40' r='2' fill='%23d4cec433'/%3E%3Ccircle cx='50' cy='35' r='1.5' fill='%23d4cec433'/%3E%3C/svg%3E");
}
.chat-messages::-webkit-scrollbar{width:0}
.msg-row{display:flex;margin-bottom:4px;animation:msgIn .3s ease both}
.msg-row.sent{justify-content:flex-end}
.msg-bubble{
  max-width:78%;padding:7px 11px 4px;border-radius:10px;position:relative;
  font-size:14.5px;line-height:1.4;color:var(--text);word-break:break-word;
}
.msg-row.received .msg-bubble{
  background:var(--white);border-top-left-radius:3px;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.msg-row.sent .msg-bubble{
  background:var(--sent);border-top-right-radius:3px;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.msg-sender{font-size:12px;font-weight:600;margin-bottom:2px}
.msg-time{font-size:10.5px;color:var(--text-light);text-align:right;margin-top:2px}
.msg-date{
  text-align:center;margin:12px 0 8px;
  font-size:12px;color:var(--text-sec);
}
.msg-date span{background:rgba(255,255,255,.85);padding:4px 14px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chat-input-bar{
  position:absolute;bottom:0;left:0;right:0;height:58px;
  background:var(--bg);padding:8px 10px;display:flex;align-items:center;gap:8px;
  border-top:1px solid rgba(0,0,0,.06);
}
.chat-input-bar input{
  flex:1;padding:10px 16px;border-radius:24px;
  background:var(--white);font-size:15px;color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.chat-input-bar input::placeholder{color:var(--text-light)}
.send-btn{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#1eba59);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(37,211,102,.3);transition:all .2s;flex-shrink:0;
}
.send-btn:hover{transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}

/* Contacts */
.section-title{
  padding:10px 16px 6px;font-size:12px;font-weight:600;
  color:var(--primary);text-transform:uppercase;letter-spacing:.8px;
  background:var(--white);
}
.contact-item{
  display:flex;align-items:center;gap:14px;padding:10px 16px;
  background:var(--white);cursor:pointer;transition:background .15s;
}
.contact-item:hover{background:#f5f6f6}
.contact-name{font-size:15px;font-weight:500;color:var(--text)}
.contact-status{font-size:12px;color:var(--text-light)}
.action-row{
  display:flex;gap:10px;padding:12px 16px;background:var(--white);
  border-bottom:8px solid #f0ebe4;
}
.action-btn{
  flex:1;padding:10px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:13px;font-weight:500;text-align:center;
  box-shadow:0 2px 8px rgba(7,94,84,.2);transition:all .2s;
}
.action-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(7,94,84,.25)}
.action-btn.outline{
  background:var(--white);color:var(--primary);
  border:1.5px solid var(--primary);box-shadow:none;
}

/* Profile */
.profile-card{
  margin:16px;padding:24px;border-radius:var(--radius);
  background:var(--white);text-align:center;box-shadow:var(--shadow);
}
.profile-avatar{
  width:80px;height:80px;border-radius:50%;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  box-shadow:0 4px 16px rgba(37,211,102,.25);
}
.profile-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px}
.profile-username{font-size:13px;color:var(--text-light);margin-bottom:16px}
.profile-stat{display:flex;justify-content:center;gap:32px;margin-bottom:16px}
.stat-item{text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--primary)}
.stat-label{font-size:11px;color:var(--text-light)}
.profile-menu{margin:0 16px}
.menu-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--white);cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--divider);font-size:15px;color:var(--text);
}
.menu-item:first-child{border-radius:var(--radius) var(--radius) 0 0}
.menu-item:last-child{border-radius:0 0 var(--radius) var(--radius);border-bottom:none}
.menu-item:hover{background:#f5f6f6}
.menu-item .mi-icon{font-size:20px;width:28px;text-align:center}
.menu-item .mi-arrow{margin-left:auto;color:var(--text-light);font-size:14px}
.logout-btn{
  margin:20px 16px;padding:14px;border-radius:var(--radius);
  background:var(--white);color:var(--danger);font-size:15px;font-weight:600;
  text-align:center;box-shadow:var(--shadow);transition:all .2s;
}
.logout-btn:hover{background:#fef2f2}

/* Modal */
.modal-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.modal-content{
  width:100%;background:var(--white);border-radius:20px 20px 0 0;
  padding:20px 20px 32px;max-height:70%;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.33,1,.68,1);
}
.modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px}
.modal-input{
  width:100%;padding:12px 16px;border-radius:var(--radius-sm);
  background:#f5f6f6;font-size:15px;color:var(--text);margin-bottom:12px;
  border:1.5px solid transparent;transition:all .2s;
}
.modal-input:focus{border-color:var(--accent);background:var(--white)}
.modal-btn{
  width:100%;padding:13px;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;font-size:15px;font-weight:600;
  transition:all .2s;
}
.modal-close{
  width:100%;padding:12px;margin-top:8px;border-radius:var(--radius-sm);
  background:#f5f6f6;color:var(--text-sec);font-size:14px;font-weight:500;
}
.check-item{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--divider);cursor:pointer;
}
.check-box{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--text-light);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:all .2s;flex-shrink:0;
}
.check-box.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.toast{
  position:absolute;top:70px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:#fff;padding:8px 20px;border-radius:20px;
  font-size:13px;z-index:100;animation:fadeIn .2s ease,fadeOut .3s ease 1.5s forwards;
}
@keyframes logoIn{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes screenIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="app">
  <!-- screens rendered by JS -->
</div>
<script>
const $ = s => document.querySelector(s);
const app = $('#app');
const COLORS = ['#E91E63','#9C27B0','#3F51B5','#00897B','#EF6C00','#5C6BC0','#00ACC1','#43A047','#8E24AA','#D81B60'];
const avatarColor = name => COLORS[Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0)) % COLORS.length];
const initials = name => name.slice(0,2).toUpperCase();
const timeStr = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
const now = new Date();
const ago = m => { const d=new Date(now-m*60000); return timeStr(d); };

const state = {
  screen:'login', tab:'chat', loginTab:'login', user:null, modal:null,
  contacts:[
    {id:1,name:'张三',online:true,avatar:'张三'},
    {id:2,name:'李四',online:true,avatar:'李四'},
    {id:3,name:'王五',online:false,avatar:'王五'},
    {id:4,name:'赵六',online:true,avatar:'赵六'},
    {id:5,name:'陈七',online:false,avatar:'陈七'},
    {id:6,name:'周八',online:true,avatar:'周八'},
  ],
  conversations:[
    {id:1,name:'张三',isGroup:false,userId:1,unread:3,time:ago(2),last:'在吗？想问你个事情',messages:[
      {text:'你好！',sent:false,time:ago(30)},
      {text:'你好呀，有什么事？',sent:true,time:ago(28)},
      {text:'周末有空吗，一起吃个饭？',sent:false,time:ago(15)},
      {text:'好啊，几点？在哪里？',sent:true,time:ago(12)},
      {text:'下午六点，老地方见',sent:false,time:ago(5)},
      {text:'在吗？想问你个事情',sent:false,time:ago(2)},
    ]},
    {id:2,name:'工作群',isGroup:true,unread:12,time:ago(5),last:'老板: 明天开会记得带文件',messages:[
      {text:'各位同事下午好',sender:'老板',sent:false,time:ago(60)},
      {text:'好的收到',sent:true,time:ago(55)},
      {text:'明天上午10点开会',sender:'老板',sent:false,time:ago(30)},
      {text:'我会准时到',sender:'李四',sent:false,time:ago(20)},
      {text:'收到，我准备一下材料',sent:true,time:ago(15)},
      {text:'明天开会记得带文件',sender:'老板',sent:false,time:ago(5)},
    ]},
    {id:3,name:'李四',isGroup:false,userId:2,unread:0,time:ago(30),last:'好的，回头联系',messages:[
      {text:'李四你好',sent:true,time:ago(120)},
      {text:'你好呀',sent:false,time:ago(115)},
      {text:'项目进展怎么样了？',sent:true,time:ago(60)},
      {text:'基本完成了，明天给你看',sent:false,time:ago(45)},
      {text:'好的，回头联系',sent:false,time:ago(30)},
    ]},
    {id:4,name:'家人群',isGroup:true,unread:5,time:ago(45),last:'妈妈: 晚上回来吃饭吗',messages:[
      {text:'今天天气真好啊',sender:'爸爸',sent:false,time:ago(180)},
      {text:'是啊，适合出去走走',sent:true,time:ago(170)},
      {text:'晚上回来吃饭吗',sender:'妈妈',sent:false,time:ago(45)},
    ]},
    {id:5,name:'王五',isGroup:false,userId:3,unread:0,time:'昨天',last:'[图片]',messages:[
      {text:'看看这个',sent:false,time:'昨天'},
      {text:'挺好的',sent:true,time:'昨天'},
    ]},
  ],
  chatId:null,
  groupChecked:new Set(),
};

function render() {
  if(state.screen==='login') return renderLogin();
  if(state.screen==='chat-detail') return renderChatDetail();
  renderMain();
}

function renderLogin() {
  const isReg = state.loginTab==='register';
  app.innerHTML = `
  <div class="login-screen">
    <div class="login-logo">💬</div>
    <div class="login-title">ChatApp</div>
    <div class="login-sub">安全、快速的跨平台即时通讯</div>
    <div class="login-tabs">
      <button class="login-tab ${state.loginTab==='login'?'active':''}" onclick="setLoginTab('login')">登录</button>
      <button class="login-tab ${state.loginTab==='register'?'active':''}" onclick="setLoginTab('register')">注册</button>
    </div>
    ${isReg?'<input class="login-input" id="regNick" placeholder="昵称" autocomplete="off">':''}
    <input class="login-input" id="loginUser" placeholder="用户名" autocomplete="off">
    <input class="login-input" id="loginPass" type="password" placeholder="密码">
    <button class="login-btn" onclick="doLogin()">${isReg?'注册并登录':'登录'}</button>
  </div>`;
}

function setLoginTab(t){state.loginTab=t;render();}

function doLogin(){
  const u=$('#loginUser')?.value?.trim();
  const p=$('#loginPass')?.value;
  if(!u||!p){showToast('请输入用户名和密码');return;}
  state.user={name:u,nickname:state.loginTab==='register'?($('#regNick')?.value?.trim()||u):u};
  state.screen='main';state.tab='chat';render();
}

function renderMain(){
  let header='',body='',activeTab=state.tab;
  if(activeTab==='chat'){
    header=`<div class="header"><h1>消息</h1></div>`;
    body=renderChatList();
  } else if(activeTab==='contacts'){
    header=`<div class="header"><h1>通讯录</h1></div>`;
    body=renderContacts();
  } else {
    header=`<div class="header"><h1>我的</h1></div>`;
    body=renderProfile();
  }
  const totalUnread=state.conversations.reduce((s,c)=>s+c.unread,0);
  app.innerHTML=`${header}<div class="screen-body" style="animation:screenIn .25s ease">${body}</div>
  <div class="tab-bar">
    <button class="tab-item ${activeTab==='chat'?'active':''}" onclick="switchTab('chat')">
      <span class="tab-icon">💬</span>消息${totalUnread?`<span class="tab-badge">${totalUnread}</span>`:''}
    </button>
    <button class="tab-item ${activeTab==='contacts'?'active':''}" onclick="switchTab('contacts')">
      <span class="tab-icon">👥</span>通讯录
    </button>
    <button class="tab-item ${activeTab==='profile'?'active':''}" onclick="switchTab('profile')">
      <span class="tab-icon">👤</span>我的
    </button>
  </div>${state.modal?renderModal():''}`;
}

function switchTab(t){state.tab=t;render();}

function renderChatList(){
  return `<div class="chat-list">${state.conversations.map(c=>{
    const col=avatarColor(c.name);
    return `<div class="chat-item" onclick="openChat(${c.id})">
      <div class="avatar" style="background:${col}">${c.isGroup?'👥':initials(c.name)}</div>
      <div class="chat-info"><div class="chat-name">${c.name}</div><div class="chat-last">${c.last}</div></div>
      <div class="chat-meta"><span class="chat-time">${c.time}</span>${c.unread?`<span class="unread-badge">${c.unread}</span>`:''}</div>
    </div>`;
  }).join('')}</div>`;
}

function openChat(id){
  state.chatId=id;state.screen='chat-detail';
  const c=state.conversations.find(x=>x.id===id);
  if(c)c.unread=0;
  render();
  const el=$('.chat-messages');if(el)el.scrollTop=el.scrollHeight;
}

function renderChatDetail(){
  const c=state.conversations.find(x=>x.id===state.chatId);
  if(!c)return;
  app.innerHTML=`
  <div class="header">
    <button class="header-back" onclick="backToMain()">←</button>
    <div><h1>${c.name}</h1><div class="subtitle">${c.isGroup?'群聊 · '+3+'位成员':'在线'}</div></div>
  </div>
  <div class="chat-messages" id="msgArea">
    <div class="msg-date"><span>今天</span></div>
    ${c.messages.map(m=>`
      <div class="msg-row ${m.sent?'sent':'received'}">
        <div class="msg-bubble">
          ${!m.sent&&m.sender?`<div class="msg-sender" style="color:${avatarColor(m.sender)}">${m.sender}</div>`:''}
          ${m.text}
          <div class="msg-time">${m.time}${m.sent?' ✓✓':''}</div>
        </div>
      </div>`).join('')}
  </div>
  <div class="chat-input-bar">
    <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>`;
  const el=$('#msgArea');if(el)el.scrollTop=el.scrollHeight;
}

function sendMsg(){
  const inp=$('#msgInput');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const c=state.conversations.find(x=>x.id===state.chatId);if(!c)return;
  c.messages.push({text,sent:true,time:timeStr(new Date())});
  c.last=text;c.time=timeStr(new Date());
  inp.value='';renderChatDetail();
  // simulate reply
  setTimeout(()=>{
    if(state.screen!=='chat-detail'||state.chatId!==c.id)return;
    const replies=['好的👌','收到！','哈哈😄','明白了','嗯嗯','稍等一下','我看看','没问题！'];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    c.messages.push({text:reply,sent:false,time:timeStr(new Date()),sender:c.isGroup?'张三':undefined});
    c.last=reply;c.time=timeStr(new Date());
    renderChatDetail();
  },1200);
}

function backToMain(){state.screen='main';render();}

function renderContacts(){
  const online=state.contacts.filter(c=>c.online);
  const offline=state.contacts.filter(c=>!c.online);
  return `
  <div class="action-row">
    <button class="action-btn" onclick="openModal('addFriend')">➕ 添加好友</button>
    <button class="action-btn outline" onclick="openModal('createGroup')">👥 创建群组</button>
  </div>
  <div class="section-title">在线 · ${online.length}</div>
  ${online.map(c=>`<div class="contact-item" onclick="startChat(${c.id})">
    <div class="avatar sm" style="background:${avatarColor(c.name)}">${initials(c.name)}<div class="online-dot"></div></div>
    <div><div class="contact-name">${c.name}</div><div class="contact-status">在线</div></div>
  </div>`).join('')}
  <div class="section-title">离线 · ${offline.length}</div>
  ${offline.map(c=>`<div class="contact-item" onclick="startChat(${c.id})">
    <div class="avatar sm" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
    <div><div class="contact-name">${c.name}</div><div class="contact-status">离线</div></div>
  </div>`).join('')}`;
}

function startChat(userId){
  const contact=state.contacts.find(c=>c.id===userId);if(!contact)return;
  let conv=state.conversations.find(c=>!c.isGroup&&c.userId===userId);
  if(!conv){
    conv={id:Date.now(),name:contact.name,isGroup:false,userId,unread:0,time:timeStr(new Date()),last:'',messages:[]};
    state.conversations.unshift(conv);
  }
  openChat(conv.id);
}

function renderProfile(){
  const u=state.user||{name:'用户',nickname:'用户'};
  return `
  <div class="profile-card">
    <div class="profile-avatar">${initials(u.nickname)}</div>
    <div class="profile-name">${u.nickname}</div>
    <div class="profile-username">@${u.name}</div>
    <div class="profile-stat">
      <div class="stat-item"><div class="stat-num">${state.contacts.length}</div><div class="stat-label">好友</div></div>
      <div class="stat-item"><div class="stat-num">${state.conversations.filter(c=>c.isGroup).length}</div><div class="stat-label">群组</div></div>
      <div class="stat-item"><div class="stat-num">${state.conversations.reduce((s,c)=>s+c.messages.length,0)}</div><div class="stat-label">消息</div></div>
    </div>
  </div>
  <div class="profile-menu">
    <div class="menu-item"><span class="mi-icon">🔔</span>通知设置<span class="mi-arrow">›</span></div>
    <div class="menu-item"><span class="mi-icon">🔒</span>隐私安全<span class="mi-arrow">›</span></div>
    <div class="menu-item"><span class="mi-icon">💾</span>数据与存储<span class="mi-arrow">›</span></div>
    <div class="menu-item"><span class="mi-icon">🌐</span>语言<span class="mi-arrow">›</span></div>
    <div class="menu-item"><span class="mi-icon">❓</span>帮助与反馈<span class="mi-arrow">›</span></div>
  </div>
  <button class="logout-btn" onclick="doLogout()">退出登录</button>`;
}

function doLogout(){state.user=null;state.screen='login';state.loginTab='login';render();}

function openModal(type){state.modal=type;render();}
function closeModal(){state.modal=null;render();}

function renderModal(){
  if(state.modal==='addFriend'){
    return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content">
        <div class="modal-title">添加好友</div>
        <input class="modal-input" id="searchInput" placeholder="输入用户名搜索...">
        <button class="modal-btn" onclick="doAddFriend()">搜索并添加</button>
        <button class="modal-close" onclick="closeModal()">取消</button>
      </div></div>`;
  }
  if(state.modal==='createGroup'){
    state.groupChecked=state.groupChecked||new Set();
    return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content">
        <div class="modal-title">创建群组</div>
        <input class="modal-input" id="groupName" placeholder="群组名称">
        <div style="font-size:13px;color:var(--text-sec);margin-bottom:8px">选择成员：</div>
        ${state.contacts.map(c=>`
          <div class="check-item" onclick="toggleCheck(${c.id})">
            <div class="check-box ${state.groupChecked.has(c.id)?'checked':''}">${state.groupChecked.has(c.id)?'✓':''}</div>
            <div class="avatar sm" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
            <span style="font-size:15px">${c.name}</span>
          </div>`).join('')}
        <button class="modal-btn" style="margin-top:12px" onclick="doCreateGroup()">创建</button>
        <button class="modal-close" onclick="closeModal()">取消</button>
      </div></div>`;
  }
  return '';
}

function toggleCheck(id){
  if(state.groupChecked.has(id))state.groupChecked.delete(id);else state.groupChecked.add(id);
  render();
}

function doAddFriend(){
  const name=$('#searchInput')?.value?.trim();
  if(!name){showToast('请输入用户名');return;}
  if(state.contacts.find(c=>c.name===name)){showToast('已经是好友了');return;}
  state.contacts.push({id:Date.now(),name,online:Math.random()>.5,avatar:name});
  closeModal();showToast('好友请求已发送 ✓');
}

function doCreateGroup(){
  const name=$('#groupName')?.value?.trim();
  if(!name){showToast('请输入群组名称');return;}
  if(state.groupChecked.size===0){showToast('请选择至少一位成员');return;}
  const conv={id:Date.now(),name,isGroup:true,unread:0,time:timeStr(new Date()),last:'群组已创建',messages:[
    {text:'群组已创建，开始聊天吧！',sent:false,sender:'系统',time:timeStr(new Date())}
  ]};
  state.conversations.unshift(conv);
  state.groupChecked=new Set();
  closeModal();showToast('群组创建成功 ✓');
  state.tab='chat';render();
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  app.appendChild(t);setTimeout(()=>t.remove(),2000);
}

render();
</script>
</body>
</html>
